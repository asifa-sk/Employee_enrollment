<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="employee-orange-theme">
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="dot"></span>
        <div>
          <div class="title">Employee Portal</div>
          <div class="subtitle">Your account</div>
        </div>
      </div>
      <nav class="nav">
        <button class="active">Dashboard</button>
        <a class="btn btn-orange" href="/pages/employee-profile.html">Profile</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>Welcome Back</h1>
          <p>Here's an overview of your profile and employment details.</p>
        </div>
        <button class="btn btn-orange" id="logoutBtn">Logout</button>
      </header>

      <section class="panel">
        <div id="profilePanel" class="card"></div>
      </section>

      <section class="panel">
        <h2>Change Password</h2>
        <p>Use your current password and set a new secure password.</p>
        <div id="passwordMessage" class="message"></div>
        <form id="changePasswordForm" class="form-grid" autocomplete="off">
          <div class="field">
            <label for="currentPassword">Current Password</label>
            <input id="currentPassword" name="currentPassword" type="password" required />
          </div>
          <div class="field">
            <label for="newPassword">New Password</label>
            <input id="newPassword" name="newPassword" type="password" minlength="8" required />
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm New Password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" required />
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button class="btn btn-orange" type="submit">Update Password</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script type="module" src="/js/employee.js"></script>
</body>
</html>
