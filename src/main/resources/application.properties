
spring.application.name=employee-enrollment

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:employee_enrollment}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:root}}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${APP_JWT_SECRET:change-this-secret-to-a-long-random-string-at-least-32-chars}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

app.bootstrap-admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap-admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:Admin@12345}
app.bootstrap-admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@company.com}
app.bootstrap-admin.first-name=${APP_BOOTSTRAP_ADMIN_FIRST_NAME:System}
app.bootstrap-admin.last-name=${APP_BOOTSTRAP_ADMIN_LAST_NAME:Administrator}
app.bootstrap-admin.phone=${APP_BOOTSTRAP_ADMIN_PHONE:9999999999}
app.bootstrap-admin.department=${APP_BOOTSTRAP_ADMIN_DEPARTMENT:Administration}
app.bootstrap-admin.salary=${APP_BOOTSTRAP_ADMIN_SALARY:0}
app.bootstrap-admin.address=${APP_BOOTSTRAP_ADMIN_ADDRESS:Railway Deployment}
